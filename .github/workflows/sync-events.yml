name: Sync Live Events

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: sync-live-events
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements-events.txt

      - name: Generate live event files
        env:
          ICAL_FEED_URL: ${{ secrets.ICAL_FEED_URL }}
          EVENT_LOOKAHEAD_DAYS: "120"
          EVENT_MAX_EVENTS: "75"
        run: python scripts/sync_events.py

      - name: Commit updated event data
        run: |
          if git diff --quiet -- registry/events-live.yaml knowledge/events/upcoming-events.md; then
            echo "No event changes detected."
            exit 0
          fi

          git config user.name "urbancrest-events-bot"
          git config user.email "actions@users.noreply.github.com"
          git add registry/events-live.yaml knowledge/events/upcoming-events.md
          git commit -m "chore: sync live events"
          git push
