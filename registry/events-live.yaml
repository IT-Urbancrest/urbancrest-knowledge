  location: Urbancrest At Lebanon - 2634 Drake Road, Lebanon, OH 45036
  description: 'We are giving away school supplies to help students in our community have what they need to succeed this school year! Students of any grade are welcome to stop by Urbancrest on Saturday, August 8 from 10:00 AM–12:00 PM to pick up needed supplies. Please register your student(s) to attend, listing the grades of each student coming, so we know how many students to expect.


    Items we are giving away range from backpacks, notebooks and paper, to pens, pencils and craft supplies. We are also offering free hair cuts for all who attend!


    Please Note: The supplies we are giving away have all been donated, so items available at the giveaway may vary by kind and quantity. We will operate on a first-come, first-serve basis, and we cannot make any guarantees.


